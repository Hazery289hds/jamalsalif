  <div class="utility_component">
    <div class="utility_form-block w-form"><img src="https://d3e54v103j8qbb.cloudfront.net/static/page-not-found.211a85e40c.svg" alt="" class="utility_image">
      <h3>Page Not Found</h3>
      <div class="padding-xxsmall"></div>
      <div>The page you are looking for doesn&#x27;t exist or has been moved</div>
      <div class="padding-xxsmall"></div>
      <a href="index.html" class="button w-button">Go Home</a>
    </div>
  </div>
  <script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=67deb3c2f04087548a7a8af8" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
  <script src="js/jamalsalif.js" type="text/javascript"></script>
  <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
  <script src="https://unpkg.com/split-type"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.3/ScrollTrigger.min.js"></script>
  <script>
  let transitionTrigger = $(".loader_trigger");
  let introDurationMS = 0;
  let exitDurationMS = 1000;
  let excludedClass = "no-transition";
  // On Page Load
  if (transitionTrigger.length > 0) {
    transitionTrigger.click();
    $("body").addClass("no-scroll-transition");
    setTimeout(() => {$("body").removeClass("no-scroll-transition");}, introDurationMS);
  }
  // On Link Click
  $("a").on("click", function (e) {
    if ($(this).prop("hostname") == window.location.host && $(this).attr("href").indexOf("#") === -1 &&
        !$(this).hasClass(excludedClass) && $(this).attr("target") !== "_blank" && transitionTrigger.length > 0) {
      e.preventDefault();
      $("body").addClass("no-scroll-transition");
      let transitionURL = $(this).attr("href");
      transitionTrigger.click();
      setTimeout(function () {
        window.location = transitionURL;
      }, exitDurationMS);
    }
  });
  // On Back Button Tap
  window.onpageshow = function(event) {if (event.persisted) {window.location.reload()}};
  // Hide Transition on Window Width Resize
  setTimeout(() => {$(window).on("resize", function () {
    setTimeout(() => {$(".transition").css("display", "none");}, 50);});
                   }, introDurationMS);
  function initLenis() {
    // Lenis: https://github.com/studio-freight/lenis
    scroll = new Lenis({
      duration: 1
    });
    scroll.on('scroll', ScrollTrigger.update);
    gsap.ticker.add((time) => {
      scroll.raf(time * 1000);
    });
    gsap.ticker.lagSmoothing(0);
  }
  function initScrollToAnchorLenis() {
    $("a[href^='#']").click(function (e) {
      e.preventDefault(); // Prevent the default jump-to-anchor behavior
      let targetScrollToAnchorLenis = $(this).attr('href');
      scroll.scrollTo(targetScrollToAnchorLenis, {
        duration: 1,
        easing: (x) => (x < 0.5 ? 8 * x * x * x * x : 1 - Math.pow(-2 * x + 2, 4) / 2),
      });
    });
  }
  window.addEventListener("DOMContentLoaded", () => {
    initLenis();
    initScrollToAnchorLenis()
    const defaultTriggerPercent = "85%";
    const defaultStagger = 0.035;
    const defaultDelay = 0.25;
    // Split text into spans
    let typeSplit = new SplitType("[gsap]", {
      types: "words",
      tagName: "span"
    });
    // Wrap each word in an additional span with the class `.word-mask`
    document.querySelectorAll("[gsap] .word").forEach(word => {
      const wrapper = document.createElement("span");
      wrapper.classList.add("word-mask");
      word.parentNode.insertBefore(wrapper, word);
      wrapper.appendChild(word);
    });
    function isMobile() {
      return window.matchMedia("(max-width: 991px)").matches;
    }
    function createScrollTrigger(triggerElement, timeline, delay, triggerPercent) {
      ScrollTrigger.create({
        trigger: triggerElement,
        start: `top ${triggerPercent}`,
        onEnter: () => {
          gsap.delayedCall(delay, () => timeline.play());
        }
      });
      ScrollTrigger.refresh();
    }
    document.querySelectorAll('[gsap="words-slide-up"]').forEach(element => {
      let delay = element.getAttribute('delay') ? parseFloat(element.getAttribute('delay')) : defaultDelay;
      let triggerPercent = element.getAttribute('triggerPercent') || defaultTriggerPercent;
      let stagger = element.getAttribute('stagger') ? parseFloat(element.getAttribute('stagger')) : defaultStagger;
      if (isMobile()) {
        delay = 0;
      }
      let tl = gsap.timeline({ paused: true });
      let animationOptions = { opacity: 0, ease: "expo.out", stagger: { each: stagger } };
      //if (navigator.userAgent.includes('Safari') && !navigator.userAgent.includes('Chrome')) {
      //  tl.from(element.querySelectorAll(".word"), { ...animationOptions, duration: 1 });
      //} else {
      //  animationOptions.opacity = 1;
      //  tl.from(element.querySelectorAll(".word"), { ...animationOptions, yPercent: 120, duration: 1 });
      //}
      animationOptions.opacity = 1;
      tl.from(element.querySelectorAll(".word"), { ...animationOptions, yPercent: 120, duration: 1 });
      createScrollTrigger(element, tl, delay, triggerPercent);
    });
    gsap.set("[gsap]", { opacity: 1 });
  });
  $(".dyn-copyright").text((new Date).getFullYear());
</script>
